<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather App</h1>
            <p>Get current weather and 5-day forecast for any city</p>
        </header>

        <main>
            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" id="cityInput" placeholder="Enter city name, ward, or area..." />
                    <select id="recentCities" class="recent-cities-dropdown" aria-label="Recent city searches" title="Select from recent city searches">
                        <option value="">Recent searches...</option>
                    </select>
                </div>
                <div class="search-buttons">
                    <button id="searchBtn">Search</button>
                    <button id="locationBtn" class="location-btn">📍 My Location</button>
                </div>
                <div id="locationSuggestions" class="location-suggestions hidden"></div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>

            <div id="error" class="error hidden">
                <p id="errorMessage"></p>
                <button id="retryBtn" class="retry-btn">Retry</button>
            </div>

            <div id="weatherInfo" class="weather-info hidden">
                <div class="view-toggle">
                    <button id="currentBtn" class="toggle-btn active">Current Weather</button>
                    <button id="forecastBtn" class="toggle-btn">5-Day Forecast</button>
                </div>

                <div id="currentView" class="weather-view">
                    <div class="weather-header">
                        <h2 id="cityName"></h2>
                        <p id="country"></p>
                        <p id="dateTime"></p>
                    </div>

                    <div class="weather-main">
                        <div class="temperature-section">
                            <span id="temperature"></span>
                            <span id="feelsLike"></span>
                        </div>
                        <div class="weather-icon-section">
                            <img id="weatherIcon" src="" alt="Weather icon" />
                            <p id="weatherDescription"></p>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-card">
                            <h3>Humidity</h3>
                            <p id="humidity"></p>
                        </div>
                        <div class="detail-card">
                            <h3>Wind Speed</h3>
                            <p id="windSpeed"></p>
                        </div>
                        <div class="detail-card">
                            <h3>Pressure</h3>
                            <p id="pressure"></p>
                        </div>
                        <div class="detail-card">
                            <h3>Visibility</h3>
                            <p id="visibility"></p>
                        </div>
                    </div>
                </div>

                <div id="forecastView" class="weather-view hidden">
                    <div class="forecast-header">
                        <h2 id="forecastCityName"></h2>
                        <p id="forecastCountry"></p>
                        <p id="forecastDateTime"></p>
                    </div>
                    <div id="forecastContainer" class="forecast-container">
                        <!-- Forecast cards will be inserted here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
